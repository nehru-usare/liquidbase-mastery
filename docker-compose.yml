version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-liquibase
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: liquibase_demo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: springboot-liquibase-app
    depends_on:
      - postgres
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=liquibase_demo
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    ports:
      - "8080:8080"

volumes:
  postgres_data:
